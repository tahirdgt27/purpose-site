<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>What's Your Purpose?</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #0d0d0f;
      --surface: #141417;
      --border:  #2a2a30;
      --accent:  #f0c040;
      --accent2: #e05c3a;
      --text:    #e8e6e0;
      --muted:   #6b6b78;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem 6rem;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, #fff 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 30%, rgba(240,192,64,0.6) 0%, transparent 100%);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    .page { position: relative; z-index: 1; width: 100%; max-width: 660px; }
    .hero { text-align: center; margin-bottom: 3.5rem; animation: fadeDown 0.9s ease both; }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    .astronaut { animation: float 4s ease-in-out infinite; filter: drop-shadow(0 0 20px rgba(240,192,64,0.25)); }
    @keyframes float { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-14px) rotate(2deg); } }
    .tag { display: inline-block; font-family: 'Syne Mono', monospace; font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); border: 1px solid rgba(240,192,64,0.3); padding: 0.3rem 0.8rem; border-radius: 2px; margin-bottom: 1.4rem; }
    h1 { font-size: clamp(2.2rem, 7vw, 4rem); font-weight: 800; line-height: 1.1; margin-bottom: 1rem; }
    h1 .yellow { color: var(--accent); }
    h1 .red { color: var(--accent2); }
    .subtitle { color: var(--muted); line-height: 1.7; max-width: 440px; margin: 0 auto; }
    .funny-row { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 3rem; flex-wrap: wrap; }
    .funny-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.8rem; text-align: center; width: 130px; transition: transform 0.25s ease; }
    .funny-card p { font-family: 'Syne Mono', monospace; font-size: 0.62rem; color: var(--muted); margin-top: 5px; }
    .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem; }
    label { display: block; font-family: 'Syne Mono', monospace; font-size: 0.68rem; color: var(--muted); margin-bottom: 0.55rem; text-transform: uppercase; }
    input, textarea { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Syne', sans-serif; padding: 0.8rem; outline: none; margin-bottom: 1.8rem; }
    input:focus, textarea:focus { border-color: var(--accent); }
    button { width: 100%; background: var(--accent); color: var(--bg); border: none; border-radius: 6px; padding: 1rem; font-weight: 700; cursor: pointer; transition: 0.2s; }
    button:hover { background: #f5d060; transform: translateY(-2px); }
    .status { text-align: center; margin-top: 1rem; font-style: italic; font-size: 0.9rem; }
    .success-panel { display: none; text-align: center; padding: 2rem; }
    .success-panel.visible { display: block; }
    .footer { margin-top: 4rem; font-family: 'Syne Mono', monospace; font-size: 0.62rem; color: var(--muted); text-align: center; opacity: 0.4; }
  </style>
</head>
<body>

<div class="page">
  <div class="hero">
    <div class="tag">⚡ existential crisis loading...</div>
    <h1>What's your <span class="yellow">purpose</span><br>in <span class="red">life?</span></h1>
    <p class="subtitle">No pressure. Philosophers have been stuck on this for 3,000 years.</p>
  </div>

  <div class="form-card" id="formContainer">
    <form id="purposeForm">
      <div class="field">
        <label>Your Name</label>
        <input type="text" name="name" id="name" placeholder="A fellow lost soul">
      </div>

      <div class="field">
        <label>Your Answer</label>
        <textarea name="answer" id="answer" placeholder="To eat good food, watch sunsets..." required></textarea>
      </div>

      <button type="submit" id="submitBtn">🚀 Send it into the void</button>
      <p id="status" class="status"></p>
    </form>

    <div class="success-panel" id="successPanel">
      <h2 style="font-size: 2rem; margin-bottom: 1rem;">🌌 Nicely done, <span style="color:var(--accent)">human.</span></h2>
      <p style="color:var(--muted)">Your answer has been sent safely. May you live every day closer to it.</p>
    </div>
  </div>

  <p class="footer">powered by formspree · github pages · no judgment zone</p>
</div>

<script>
  const form = document.getElementById('purposeForm');
  const status = document.getElementById('status');
  const successPanel = document.getElementById('successPanel');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const submitBtn = document.getElementById('submitBtn');
    
    submitBtn.disabled = true;
    status.innerText = "Launching into the void... 🛸";

    const data = new FormData(form);

    try {
      const response = await fetch("https://formspree.io/f/xrergqea", {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });

      if (response.ok) {
        form.style.display = "none";
        successPanel.classList.add('visible');
      } else {
        status.innerText = "Oops! Something went wrong.";
        submitBtn.disabled = false;
      }
    } catch (error) {
      status.innerText = "Connection error. Try again?";
      submitBtn.disabled = false;
    }
  });
</script>

</body>
</html>
