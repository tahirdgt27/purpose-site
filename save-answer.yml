name: Save Purpose Answers

on:
  repository_dispatch:
    types: [new_answer]

jobs:
  save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Append answer to file
        run: |
          echo "----------------------------------------" >> answers.txt
          echo "Date: $(date -u)" >> answers.txt
          echo "Name: ${{ github.event.client_payload.name }}" >> answers.txt
          echo "" >> answers.txt
          echo "${{ github.event.client_payload.answer }}" >> answers.txt
          echo "" >> answers.txt

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add answers.txt
          git commit -m "New answer added"
          git push
